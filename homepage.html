<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEYAD2</title>
    <style>
    :root {
      --bg-color: #021a54;       
      --card-bg: #ffffff;          
      --text-main: #021a54;      
      --text-muted: #ff85bb;     
      --accent-primary: #ff85bb;  
      --accent-light: #ffceee;   
      --bg-light: #ffceee;       
      --border-color: #ff85bb;   
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      direction: rtl;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        cursor: pointer;
        user-select: none;
        margin-bottom: 30px;
    }

    .logo-text {
        font-size: 3.5rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgb(255, 133, 187);
        filter: drop-shadow(0 0 15px rgba(255, 133, 187, 0.6));
        transition: all 0.3s ease;
        margin: 0;
    }

    .logo-icon {
        font-size: 3.8rem;
        animation: float 3s ease-in-out infinite;
        filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
    }

    .logo-container:hover .logo-text {
        filter: drop-shadow(0 0 25px rgba(255, 133, 187, 0.9));
        transform: scale(1.03);
    }

    @keyframes float {
        0%, 100% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-8px) rotate(5deg);
        }
    }

    @media (max-width: 600px) {
        .logo-text {
            font-size: 2.2rem;
        }
        .logo-icon {
            font-size: 2.5rem;
        }
    }

    .tip-box {
      position: fixed;
      left: 20px;
      top: 40px;
      width: 180px;
      background: #fff5fb;
      border: 2px dashed #f48dbf;
      border-radius: 15px;
      padding: 15px;
      color: #23306d;
      text-align: center;
      font-weight: bold;
      z-index: 9999;
    }

    .top-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0 40px 0;
    }

    .long-btn {
      width: 100%;
      max-width: 400px;
      height: 45px;
      background-color: var(--bg-color);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .long-btn a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .long-btn:hover {
      background-color: #01113a;
      transform: translateY(-1px);
    }

    .long-btn:active {
      transform: translateY(1px);
    }

    .cards-container {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      width: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
    }

    .card img {
      width: 100%;
      height: 200px; 
      object-fit: cover; 
      border-radius: 6px;
      border: 2px solid var(--border-color);
      margin-bottom: 15px;
    }

    .name {
      font-size: 18px;
      font-weight: 600;
      color: var(--bg-color);
      margin: 0 0 15px 0;
      text-align: center;
    }

    .card input[type="number"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 15px;
      text-align: center;
      box-sizing: border-box;
    }

    .card input[type="number"]:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 8px rgba(255, 133, 187, 0.5);
    }

    .card button {
      width: 100%;
      background-color: var(--accent-primary);
      color: white;
      border: none;
      padding: 10px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      margin: 0;
    }

    .card button:hover {
      background-color: #e06c9f;
      transform: translateY(-1px);
    }

    .card button:active {
      transform: translateY(1px);
    }

    h2 {
      color: var(--bg-color);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
      margin-top: 0;
      margin-bottom: 15px;
      text-align: right;
    }

    .cart-container-card {
      background-color: var(--card-bg);
      padding: 25px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      margin: 20px auto;
      max-width: 850px;
    }

    #cart {
      padding-right: 20px;
      margin: 0;
    }

    #cart li {
      color: var(--text-main);
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    </style>
</head>
<body>

<div class="cart-container-card">
  <h2>עגלה</h2>
  <ul id="cart"></ul>
</div>

<script>
function addToCart(gameId) {
  const input = document.getElementById(gameId);
  if (!input) return;
  
  const quantity = input.value;
  
  if (quantity > 0 && quantity.trim() !== "") {
    const cart = document.getElementById("cart");
    const li = document.createElement("li");
    const displayName = gameId.replace('_', ' ');
    
    li.textContent = displayName + " - כמות: " + quantity;
    cart.appendChild(li);
    input.value = "";
  }
}
</script>
