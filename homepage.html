<style>
.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    user-select: none;
}

.logo-text {
    font-size: 3.5rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgb(255, 133, 187);
    filter: drop-shadow(0 0 15px rgba(255, 133, 187, 0.6));
    transition: all 0.3s ease;
}

.logo-icon {
    font-size: 3.8rem;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
}

.logo-container:hover .logo-text {
    filter: drop-shadow(0 0 25px rgba(255, 133, 187, 0.9));
    transform: scale(1.03);
}

@keyframes float {
    0%, 100% {
        transform: translateY(0) rotate(0deg);
    }
    50% {
        transform: translateY(-8px) rotate(5deg);
    }
}

@media (max-width: 600px) {
    .logo-text {
        font-size: 2.2rem;
    }
    .logo-icon {
        font-size: 2.5rem;
    }
}

.tip-box{
  position: fixed;
  right: 20px;
  top: 200px;
  width: 180px;
  background: #fff5fb;
  border: 2px dashed #f48dbf;
  border-radius: 15px;
  padding: 15px;
  color: #23306d;
  text-align: center;
  font-weight: bold;
  z-index: 9999;
}

   :root {
  --bg-color: #021a54;       
  --card-bg: #ffffff;          
  --text-main: #021a54;      
  --text-muted: #ff85bb;     
  --accent-primary: #ff85bb;  
  --accent-light: #ffceee;   
  --bg-light: #ffceee;       
  --border-color: #ff85bb;   
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-light);
  color: var(--text-main);
  direction: rtl;
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.6;
}

.top-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0 40px 0;
}

.long-btn {
  width: 100%;
  max-width: 400px;
  height: 45px;
  background-color: var(--bg-color);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.long-btn a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.long-btn:hover {
  background-color: #01113a;
  transform: translateY(-1px);
}

.long-btn:active {
  transform: translateY(1px);
}

.cards-container {
  display: flex;
  gap: 25px;
  justify-content: center;
  flex-wrap: wrap;
