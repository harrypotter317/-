<style>
   :root {
  --bg-color: #021a54;       
  --card-bg: #ffffff;          
  --text-main: #021a54;      
  --text-muted: #ff85bb;     
  --accent-primary: #ff85bb; 
  --accent-light: #ffceee;   
  --bg-light: #ffceee;       
  --border-color: #ff85bb;   
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-light);
  color: var(--text-main);
  direction: rtl;
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.6;
}

/* Top Buttons Container */
.top-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0 40px 0;
}

/* Profile / About navigation links */
.long-btn {
  width: 100%;
  max-width: 400px;
  height: 45px;
  background-color: var(--bg-color);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.long-btn a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.long-btn:hover {
  background-color: #01113a;
  transform: translateY(-1px);
}

.long-btn:active {
  transform: translateY(1px);
}

/* Grid Container for Game Cards */
.cards-container {
  display: flex;
  gap: 25px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

/* Game Card Components */
.card {
  background-color: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 20px;
  width: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
  box-sizing: border-box;
}

.card img {
  width: 100%;
  height: 200px; 
  object-fit: cover; 
  border-radius: 6px;
  border: 2px solid var(--border-color);
  margin-bottom: 15px;
}

.name {
  font-size: 18px;
  font-weight: 600;
  color: var(--bg-color);
  margin: 0 0 15px 0;
  text-align: center;
}

/* Numeric Input Styles */
.card input[type="number"] {
  width: 100%;
  padding: 8px;
  margin-bottom: 15px;
  background-color: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-main);
  font-size: 15px;
  text-align: center;
  box-sizing: border-box;
}

.card input[type="number"]:focus {
  outline: none;
  border-color: var(--accent-primary);
  box-shadow: 0 0 8px rgba(255, 133, 187, 0.5);
}

/* Add To Cart Button styling */
.card button {
  width: 100%;
  background-color: var(--accent-primary);
  color: white;
  border: none;
  padding: 10px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
  margin: 0;
}

.card button:hover {
  background-color: #e06c9f;
  transform: translateY(-1px);
}

.card button:active {
  transform: translateY(1px);
}

/* Section Header Styling */
h2 {
  color: var(--bg-color);
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 8px;
  margin-top: 0;
  margin-bottom: 15px;
  text-align: right;
}

/* Styled Container Box for Cart Elements below everything */
.cart-container-card {
  background-color: var(--card-bg);
  padding: 25px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
  margin: 20px auto;
  max-width: 850px;
}

/* Shopping Cart List Styles */
#cart {
  padding-right: 20px;
  margin: 0;
}

#cart li {
  color: var(--text-main);
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 6px;
}
</style>
<script>
    
function addToCart(id) {

  const input = document.getElementById(id);

  const quantity = input.value;

  const cart = document.getElementById("cart");

  const li = document.createElement("li");

  li.textContent = id + " - כמות: " + quantity;

  cart.appendChild(li);
}

</script>
