<body>
    <h1>GAMEYAD2</h1>

<input
  type="text"
  id="username"
  placeholder="אימייל">

<input
  type="password"
  id="password"
  placeholder="סיסמה">

<button onclick="login()">
  Login
</button>
</body>
<style>
    
:root {
  --primary-navy: #021A54;
  --accent-pink: #FF85BB;
  --light-pink: #FFCEE3;
  --bg-neutral: #F5F5F5;
  --white: #ffffff;
}

html {
  background-color: var(--bg-neutral);
  margin: 0;
  padding: 0;
}


body {
  margin: 0 auto;
  margin-top: 10vh;
  padding: 40px 30px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  

  background-color: var(--light-pink); 
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(2, 26, 84, 0.1);
  
  
  width: 100%;
  max-width: 360px;
  box-sizing: border-box;


  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  direction: rtl; 
}


h1 {
  color: var(--primary-navy);
  margin-top: 0;
  margin-bottom: 25px;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: 1px;
  text-align: center;
}


input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 15px;
  border: 2px solid transparent;
  border-radius: 10px;
  font-size: 1rem;
  font-family: inherit;
  box-sizing: border-box;
  background-color: var(--white);
  transition: all 0.3s ease;
}
input:focus {
  outline: none;
  border-color: var(--accent-pink); 
  box-shadow: 0 0 10px rgba(255, 133, 187, 0.4);
}


input::placeholder {
  color: #aaaaaa;
  font-size: 0.9rem;
}

button {
  width: 100%;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 600;
  padding: 14px;
  background-color: var(--primary-navy);
  color: var(--white);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 5px;
  box-shadow: 0 5px 15px rgba(2, 26, 84, 0.15);
  transition: all 0.3s ease;
}

button:hover {
  background-color: var(--accent-pink);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(255, 133, 187, 0.4);
}


button:active {
  transform: translateY(0);
}
</style>
<script>
    function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const savedPassword =
        localStorage.getItem(username + "_password");

    if (savedPassword === password && savedPassword !== null) {

        alert("התחברת בהצלחה!");

        window.location.href = "homepage.html";
    } else {

        alert("שם משתמש או סיסמה שגויים");

    }
}
</script>
