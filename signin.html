<html>
    <h1>GAMEYAD2</h1>

<input id="newUsername" type="text" placeholder="אימייל">
<input id="newPassword" type="password" placeholder="סיסמה">

<input id="city" type="text" placeholder="עיר מגורים">
<input id="country" type="text" placeholder="כתובת מלאה">

<button onclick="register()">Sign Up</button>



</body>
<style>
    /* הגדרת משתני פלטת הצבעים */
:root {
  --primary-navy: #021A54;
  --accent-pink: #FF85BB;
  --light-pink: #FFCEE3;
  --bg-neutral: #F5F5F5;
  --white: #ffffff;
  --gray-border: #dddddd;
}

body {
  margin: 0;
  padding: 20px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-neutral);
  min-height: 100vh;
  display: flex;
  flex-direction: column; 
  justify-content: center;
  align-items: center;
  direction: rtl; 
}

h1 {
  color: var(--primary-navy);
  margin-bottom: 1.5rem;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
}


input {
  width: 100%;
  max-width: 320px; 
  padding: 12px 16px;
  margin-bottom: 15px; 
  border: 2px solid var(--gray-border);
  border-radius: 8px;
  font-size: 1rem;
  font-family: inherit;
  box-sizing: border-box;
  transition: all 0.3s ease;
  background-color: var(--white);
}

input:focus {
  outline: none;
  border-color: var(--primary-navy); 
  box-shadow: 0 0 8px rgba(2, 26, 84, 0.15);
}

input::placeholder {
  color: #999999;
  font-size: 0.9rem;
}

button {
  width: 100%;
  max-width: 320px;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 600;
  padding: 14px;
  background-color: var(--accent-pink); 
  color: var(--white);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(255, 133, 187, 0.2);
  margin-top: 10px;
}

button:hover {
  background-color: #e06fa1;
  transform: translateY(-2px); 
  box-shadow: 0 6px 15px rgba(255, 133, 187, 0.4);
}
button:active {
  transform: translateY(0);
}
</style>
<script>
    function register() {
    const username = document.getElementById("newUsername").value;
    const password = document.getElementById("newPassword").value;
    const city = document.getElementById("city").value;
    const country = document.getElementById("country").value;

    localStorage.setItem(username + "_password", password);
    localStorage.setItem(username + "_city", city);
    localStorage.setItem(username + "_country", country);

    alert("נרשמת בהצלחה!");
    window.location.href = "homepage.html";
}
</script>
